<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Presupuesto - El Baqueano</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.documento{
    background:white;
    padding:30px;
    max-width:1200px;
    margin:auto;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
.logo-box{
    width:120px;
    height:80px;
    border:2px dashed #ccc;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}
.titulo{
    text-align:center;
    font-size:40px;
    font-weight:bold;
    margin:20px 0;
}
.table th{
    background:#0d6efd;
    color:white;
}
.total-box{
    font-size:20px;
    font-weight:bold;
}

/* ---------- TABLA PDF ---------- */

#tablaItems{
    border-collapse: collapse !important;
    border:1px solid #212529 !important;
}

#tablaItems thead th{
    border:1px solid #212529 !important;
}

#tablaItems tbody td{
    border:1px solid #212529 !important;
}

/* Fuerza el cierre inferior */
#tablaItems tbody tr:last-child td{
    border-bottom:2px solid #212529 !important;
}
@media print{
    .no-print{
        display:none!important;
    }
}
@media print {
    .no-pdf {
        display: none !important;
    }
}

/* ===================================
   FORMATO FIJO PARA GENERAR PDF
=================================== */

.modo-pdf{
    width:1200px !important;
    max-width:1200px !important;
    padding:30px !important;
}


.modo-pdf .row{
    display:flex !important;
    flex-wrap:nowrap !important;
}


.modo-pdf .col-md-2{
    width:16.666666% !important;
}


.modo-pdf .col-md-7{
    width:58.333333% !important;
}


.modo-pdf .col-md-3{
    width:25% !important;
}


.modo-pdf .col-md-5{
    width:41.666666% !important;
}


.modo-pdf .col-md-4{
    width:33.333333% !important;
}


.modo-pdf .col-md-3{
    width:25% !important;
}


/* ===================================
   CAMPOS DATOS GENERALES EN PDF
=================================== */

.modo-pdf #facturacion,
.modo-pdf #envio,
.modo-pdf #fecha,
.modo-pdf #descripcion,
.modo-pdf #observaciones{

    background:#fff !important;
    border:1px solid #212529 !important;
    border-radius:4px !important;
    box-shadow:none !important;
    padding:8px !important;
}


/* ===================================
   TABLA DE ITEMS IGUAL QUE ANTES
=================================== */

.modo-pdf #tablaItems input{

    border:none !important;
    box-shadow:none !important;
    background:transparent !important;
    padding:0 !important;

}


/* Mantener apariencia profesional */
.modo-pdf label{
    margin-bottom:5px;
}

    .modo-pdf textarea{
    min-height:80px !important;
    resize:none !important;
}


.modo-pdf #descripcion{
    height:70px !important;
}


.modo-pdf #observaciones{
    height:100px !important;
}


.modo-pdf #tablaItems{
    width:100% !important;
    display:table !important;
    overflow:visible !important;
}



/* =========================================
   RESPONSIVE CELULAR - SOLO PANTALLA
========================================= */

@media (max-width: 768px){

    body{
        background:#fff;
    }

    .container{
        padding:0;
    }

    .documento{
        padding:15px;
        box-shadow:none;
        width:100%;
    }


    /* HEADER */
    .documento .row.align-items-center{
        display:block !important;
        text-align:center;
    }


    .documento .col-md-2,
    .documento .col-md-7,
    .documento .col-md-3{
        width:100% !important;
        margin-bottom:15px;
    }


    .documento img{
        max-height:90px !important;
    }


    .titulo{
        font-size:28px;
        margin:15px 0;
    }


    /* DATOS CLIENTE */

    .row.mb-4 .col-md-5,
    .row.mb-4 .col-md-4,
    .row.mb-4 .col-md-3{
        width:100%;
        margin-bottom:15px;
    }


    input,
    textarea{
        font-size:16px !important;
        min-height:45px;
    }


    textarea{
        resize:none;
    }



    /* TABLA ITEMS */

    #tablaItems{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
        font-size:14px;
    }


    #tablaItems th,
    #tablaItems td{
        min-width:120px;
        vertical-align:middle;
    }


    #tablaItems th:first-child,
    #tablaItems td:first-child{
        min-width:40px;
    }


    /* PRODUCTO */
    .producto,
    .detalle{
        width:220px;
    }


    /* CANTIDAD */
    .cantidad{
        width:70px !important;
    }


    .input-group-text{
        padding:8px;
    }


    /* TARIFA */
    .tarifa{
        width:120px;
    }


    /* BOTON AGREGAR */
    .btn-success{
        width:100%;
        padding:12px;
    }


    /* OBSERVACIONES Y TOTALES */

    .row .col-md-7,
    .row .col-md-5{
        width:100%;
    }


    .total-box table{
        width:100%;
    }


    /* FIRMA */

    .col-6{
        width:100%;
    }


}


/* =========================================
   EL PDF NO SE TOCA
========================================= */

.modo-pdf{
    width:1200px !important;
    max-width:1200px !important;
}



.tabla-responsive{
    width:100%;
}


@media(max-width:768px){

.tabla-responsive{
    overflow-x:auto;
}

}



    /* ===================================
   ALINEACIÓN ENCABEZADOS TABLA PDF
=================================== */

/* Centrar encabezados excepto Producto/Servicio */
#tablaItems thead th:not(:nth-child(2)){
    text-align:center !important;
    vertical-align:middle !important;
}


/* Producto / Servicio queda alineado a la izquierda */
#tablaItems thead th:nth-child(2){
    text-align:left !important;
    vertical-align:middle !important;
}


/* Mantener también centrados los valores numéricos */
#tablaItems td:nth-child(1),
#tablaItems td:nth-child(3),
#tablaItems td:nth-child(4),
#tablaItems td:nth-child(5){
    text-align:center;
    vertical-align:middle;
}


/* Producto queda a la izquierda */
#tablaItems td:nth-child(2){
    text-align:left;
}

    




    

</style>
</head>
<body>

<div class="container my-4">

<div class="documento" id="contenidoPDF">

    <!-- ENCABEZADO -->
  <div class="row align-items-center border-bottom pb-3 mb-4">

    <!-- Logo -->
    <div class="col-md-2 text-center">
        <img src="LOGO.jpeg"
             class="img-fluid rounded"
             style="max-height:120px;"
             alt="Logo El Baqueano">
    </div>

    <!-- Datos Empresa -->
    <div class="col-md-7">
        <h2 class="fw-bold mb-1">EL BAQUEANO</h2>

        <div class="text-muted">
            <div><strong>Localidad:</strong> Mariano I. Loza</div>
            <div><strong>Teléfono:</strong> 3773431057</div>
            <div><strong>Email:</strong> transporteelbaqueano@gmail.com</div>
        </div>
    </div>

    <!-- Presupuesto -->
    <div class="col-md-3 text-end">
        <h4 class="text-primary fw-bold mb-0"></h4>
        <small class="text-muted"> </small>
    </div>

</div>
    

    <div class="titulo">
        PRESUPUESTO
    </div>

    <!-- DATOS -->
    <div class="row mb-4">
        <div class="col-md-5">
            <label class="fw-bold">Facturación Dirección</label>
            <input class="form-control" id="facturacion" placeholder="Cliente">
        </div>

        <div class="col-md-4">
            <label class="fw-bold">Envíe a</label>
            <input class="form-control" id="envio" placeholder="Destino">
        </div>

        <div class="col-md-3">
        

            <label class="fw-bold">Fecha</label>
            <input type="date" class="form-control" id="fecha">
        </div>
    </div>

    <!-- DESCRIPCION -->
    <div class="mb-3">
        <label class="fw-bold">Descripción del trabajo</label>
        <textarea class="form-control" rows="2" id="descripcion"> </textarea>
    </div>

    <!-- TABLA -->
    <div class="tabla-responsive">
    <table class="table table-bordered align-middle" id="tablaItems">
   
        <thead>
            <tr>
                <th width="5%">#</th>
                <th>Producto / Servicio</th>
                <th width="12%">Cantidad / Hs</th>
                <th width="15%">Tarifa / Hs</th>
                <th width="15%">Importe</th>
                <th width="5%" class="no-print no-pdf">X</th>
            </tr>
        </thead>

        <tbody id="tbody">

        </tbody>
    </table>
    </div>

    <button class="btn btn-success no-print no-pdf mb-4" onclick="agregarFila()">
        Agregar Item
    </button>

    <!-- OBSERVACIONES -->
    <div class="row">
        <div class="col-md-7">
            <label class="fw-bold">Observaciones</label>
            <textarea class="form-control" rows="4" id="observaciones">  </textarea>
        </div>

        <div class="col-md-5">
            <table class="table">
                <tr>
                    <td>Subtotal</td>
                    <td class="text-end" id="subtotal">$ 0</td>
                </tr>

               <tr>
    <td>IVA (%)</td>
    <td>
        <div class="d-flex justify-content-end">
            <input
                type="number"
                class="form-control text-end"
                id="iva"
                value="21"
                onchange="calcularTotales()"
                style="width:90px;">
        </div>
    </td>
</tr>

                <tr>
                    <td>IVA</td>
                    <td class="text-end" id="montoIva">$ 0</td>
                </tr>

                <tr class="table-primary">
                    <td class="fw-bold">TOTAL</td>
                    <td class="text-end fw-bold" id="total">$ 0</td>
                </tr>
            </table>
        </div>
    </div>

    <!-- FIRMA -->
    <div class="row mt-5">
        <div class="col-6"></div>

        <div class="col-6 text-center">
            <br><br>
            ___________________________
            <br>
            AGUERRE LUCAS
        </div>
    </div>

</div>

<!-- BOTONES -->
<div class="text-center my-4 no-print">
    <button class="btn btn-danger btn-lg"
            onclick="generarPDF()">
        Generar PDF
    </button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function formatoMoneda(valor){
    return new Intl.NumberFormat('es-AR',{
        style:'currency',
        currency:'ARS'
    }).format(valor);
}

function agregarFila(
    producto='',
    detalle='',
    cantidad='',
    tarifa=''
){

    let tbody=document.getElementById('tbody');

    let fila=document.createElement('tr');

    fila.innerHTML=`
        <td class="numero"></td>

        <td>
            <input class="form-control producto"
                   value="${producto}"
                   placeholder="Producto">

            <input class="form-control mt-1 detalle"
                   value="${detalle}"
                   placeholder="Detalle">
        </td>

     <td>
        <div class="input-group">
        <input type="number"
               class="form-control cantidad text-end"
               value="${cantidad}"
               min="0"
               oninput="calcularTotales()">
        </div>
        </td>

        <td>
            <input type="number"
       class="form-control tarifa text-end"
       value="${tarifa}"
       oninput="calcularTotales()">
        </td>

        <td class="importe text-end">
            $0
        </td>

        <td class="no-print no-pdf">
            <button class="btn btn-sm btn-danger"
            onclick="eliminarFila(this)">
            X
            </button>
        </td>
    `;

    tbody.appendChild(fila);

    numerar();
    calcularTotales();
}

function eliminarFila(btn){
    btn.closest('tr').remove();
    numerar();
    calcularTotales();
}

function numerar(){

    document.querySelectorAll('.numero')
    .forEach((td,index)=>{
        td.innerText=index+1;
    });

}

function calcularTotales(){

    let subtotal=0;

    document.querySelectorAll('#tbody tr')
    .forEach(fila=>{

        let cantidad=
        parseFloat(
            fila.querySelector('.cantidad').value
        )||0;

        let tarifa=
        parseFloat(
            fila.querySelector('.tarifa').value
        )||0;

        let importe=
        cantidad*tarifa;

        subtotal+=importe;

        fila.querySelector('.importe')
        .innerText=
        formatoMoneda(importe);

    });

    let ivaPorcentaje=
    parseFloat(
        document.getElementById('iva').value
    )||0;

    let iva=subtotal*ivaPorcentaje/100;

    let total=subtotal+iva;

    document.getElementById('subtotal')
    .innerText=formatoMoneda(subtotal);

    document.getElementById('montoIva')
    .innerText=formatoMoneda(iva);

    document.getElementById('total')
    .innerText=formatoMoneda(total);

}

async function generarPDF(){

    const contenido = document.getElementById('contenidoPDF');

    contenido.classList.add('modo-pdf');

    document.querySelectorAll('.no-pdf').forEach(el => {
        el.style.display = 'none';
    });

    try{

        const { jsPDF } = window.jspdf;

        const contenido =
        document.getElementById('contenidoPDF');

        const canvas =
        await html2canvas(contenido,{
            scale:3,
            useCORS:true,
            logging:false
        });

        const imgData =
        canvas.toDataURL('image/jpeg',1.0);

        const pdf =
        new jsPDF('p','mm','a4');

        const pdfWidth = 210;
        const pdfHeight = 297;

        const imgWidth = pdfWidth;
        const imgHeight =
        (canvas.height * imgWidth) /
        canvas.width;

        let heightLeft = imgHeight;
        let position = 0;

        pdf.addImage(
            imgData,
            'JPEG',
            0,
            position,
            imgWidth,
            imgHeight
        );

        heightLeft -= pdfHeight;

        while(heightLeft > 0){

            position =
            heightLeft - imgHeight;

            pdf.addPage();

            pdf.addImage(
                imgData,
                'JPEG',
                0,
                position,
                imgWidth,
                imgHeight
            );

            heightLeft -= pdfHeight;
        }

       const cliente =
    document.getElementById('facturacion').value ||
    'Cliente';

let nombreArchivo = cliente
    .trim()
    .replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ ]/g, '')
    .replace(/\s+/g, '-');

pdf.save('Presupuesto-' + nombreArchivo + '.pdf');
contenido.classList.remove('modo-pdf');

document.querySelectorAll('.no-pdf').forEach(el => {
    el.style.display = '';
});

    }catch(error){

        console.error(error);

        alert(
            'Error al generar PDF'
        );
    }
}


// Datos iniciales similares a tu ejemplo
document.getElementById('fecha').value =
new Date().toISOString().split('T')[0];

agregarFila();

</script>

</body>
</html>
