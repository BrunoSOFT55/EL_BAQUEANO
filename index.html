<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Presupuesto - El Baqueano</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.documento{
    background:white;
    padding:30px;
    max-width:1200px;
    margin:auto;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
.logo-box{
    width:120px;
    height:80px;
    border:2px dashed #ccc;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
}
.titulo{
    text-align:center;
    font-size:40px;
    font-weight:bold;
    margin:20px 0;
}
.table th{
    background:#0d6efd;
    color:white;
}
.total-box{
    font-size:20px;
    font-weight:bold;
}

/* ---------- TABLA PDF ---------- */

#tablaItems{
    border-collapse: collapse !important;
    border:1px solid #212529 !important;
}

#tablaItems thead th{
    border:1px solid #212529 !important;
}

#tablaItems tbody td{
    border:1px solid #212529 !important;
}

/* Fuerza el cierre inferior */
#tablaItems tbody tr:last-child td{
    border-bottom:2px solid #212529 !important;
}
@media print{
    .no-print{
        display:none!important;
    }
}
@media print {
    .no-pdf {
        display: none !important;
    }
}

/* ===================================
   FORMATO FIJO PARA GENERAR PDF
=================================== */

.modo-pdf{
    width:1200px !important;
    max-width:1200px !important;
    padding:30px !important;
}


.modo-pdf .row{
    display:flex !important;
    flex-wrap:nowrap !important;
}


.modo-pdf .col-md-2{
    width:16.666666% !important;
}


.modo-pdf .col-md-7{
    width:58.333333% !important;
}


.modo-pdf .col-md-3{
    width:25% !important;
}


.modo-pdf .col-md-5{
    width:41.666666% !important;
}


.modo-pdf .col-md-4{
    width:33.333333% !important;
}


.modo-pdf .col-md-3{
    width:25% !important;
}


.modo-pdf input,
.modo-pdf textarea{
    border:none !important;
    box-shadow:none !important;
}


.modo-pdf #tablaItems{
    width:100% !important;
    display:table !important;
    overflow:visible !important;
}




   /* =========================================
   TABLA PRESUPUESTO MOBILE PREMIUM
========================================= */

@media(max-width:768px){

    #tablaItems{
        border-collapse:separate !important;
        border-spacing:0;
    }


    #tablaItems thead{
        display:none;
    }


    #tablaItems tbody{
        display:block;
    }


    #tablaItems tr{
        display:block;
        border:1px solid #212529;
        border-radius:10px;
        margin-bottom:15px;
        padding:12px;
        background:#fff;
        box-shadow:0 2px 8px rgba(0,0,0,.08);
    }


    #tablaItems td{
        display:flex;
        align-items:center;
        justify-content:space-between;
        width:100% !important;
        border:none !important;
        padding:8px 5px;
    }


    /* Número */

    #tablaItems td.numero{
        justify-content:flex-start;
        font-weight:bold;
        color:#0d6efd;
        border-bottom:1px solid #ddd !important;
        margin-bottom:8px;
    }


    #tablaItems td.numero::before{
        content:"Item ";
    }



    /* Producto */

    #tablaItems td:nth-child(2){
        display:block;
    }


    #tablaItems td:nth-child(2)::before{
        content:"Producto / Servicio";
        display:block;
        font-weight:bold;
        margin-bottom:5px;
    }



    /* Cantidad */

    #tablaItems td:nth-child(3)::before{
        content:"Cantidad";
        font-weight:bold;
    }



    /* Tarifa */

    #tablaItems td:nth-child(4)::before{
        content:"Tarifa";
        font-weight:bold;
    }



    /* Importe */

    #tablaItems td:nth-child(5){

        background:#f1f7ff;
        border-radius:8px;
        margin-top:8px;
        font-size:16px;
        font-weight:bold;
        color:#0d6efd;
    }


    #tablaItems td:nth-child(5)::before{
        content:"Importe";
        color:#212529;
    }



    /* Botón eliminar */

    #tablaItems td:nth-child(6){

        justify-content:center;
        margin-top:10px;
    }


    #tablaItems td:nth-child(6) button{

        width:100%;
        max-width:150px;
        font-weight:bold;

    }



    #tablaItems input{

        width:65%;
        text-align:right;
    }


    #tablaItems td:nth-child(2) input{

        width:100%;
        text-align:left;

    }


    .input-group{

        width:65%;
    }


}

    /* ==========================================
   RESTAURAR TABLA ORIGINAL PARA PDF
========================================== */

.modo-pdf #tablaItems{
    display:table !important;
    width:100% !important;
    border-collapse:collapse !important;
}


.modo-pdf #tablaItems thead{
    display:table-header-group !important;
}


.modo-pdf #tablaItems tbody{
    display:table-row-group !important;
}


.modo-pdf #tablaItems tr{
    display:table-row !important;
    border:1px solid #212529 !important;
    padding:0 !important;
    box-shadow:none !important;
    border-radius:0 !important;
}


.modo-pdf #tablaItems td,
.modo-pdf #tablaItems th{
    display:table-cell !important;
    border:1px solid #212529 !important;
    padding:8px !important;
    width:auto !important;
}


.modo-pdf #tablaItems td::before{
    content:none !important;
}


.modo-pdf #tablaItems input,
.modo-pdf #tablaItems textarea{
    width:100% !important;
}



    /* ==========================================
   AJUSTES FINALES PDF
========================================== */


/* Ocultar columna eliminar en PDF */

.modo-pdf #tablaItems th:last-child,
.modo-pdf #tablaItems td:last-child{
    display:none !important;
}


/* Mantener cantidad y hs juntos */

.modo-pdf .input-group{
    display:flex !important;
    flex-wrap:nowrap !important;
    width:100% !important;
}


.modo-pdf .input-group .cantidad{
    width:100% !important;
}


.modo-pdf .input-group-text{
    display:flex !important;
    align-items:center !important;
    white-space:nowrap !important;
}



/* ==========================================
   UNIDAD HS SIN RECUADRO EN PDF
========================================== */

.modo-pdf .cantidad-box{
    display:flex !important;
    align-items:center !important;
    justify-content:flex-end;
    gap:4px;
}


.modo-pdf .cantidad-box .cantidad{
    border:0 !important;
    background:transparent !important;
    box-shadow:none !important;
    text-align:right !important;
    padding-right:2px;
}


.modo-pdf .cantidad-box .input-group-text{

    border:0 !important;
    background:transparent !important;
    padding:0 !important;
    color:#212529;
    font-weight:normal;

}


    @media(max-width:768px){

    .cantidad-box{
        justify-content:flex-end;
        gap:5px;
    }


    .cantidad-box .input-group-text{
        background:transparent;
        border:0;
        padding:0;
    }

}


/* ==========================================
   CANTIDAD + HS MISMA LINEA PDF
========================================== */

.modo-pdf .cantidad-box{
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
    flex-wrap:nowrap !important;
    white-space:nowrap !important;
}


.modo-pdf .cantidad-box .cantidad{
    display:inline-block !important;
    width:50px !important;
    height:auto !important;
    padding:0 !important;
    margin:0 !important;
    text-align:right !important;
}


.modo-pdf .cantidad-box .input-group-text{
    display:inline-block !important;
    width:auto !important;
    padding:0 !important;
    margin-left:4px !important;
    background:none !important;
    border:0 !important;
}
    .modo-pdf td:nth-child(3){
    vertical-align:middle !important;
}



/* ==========================================
   DATOS SUPERIORES PDF - 3 COLUMNAS
========================================== */

.modo-pdf .row.mb-4{
    display:flex !important;
    flex-wrap:nowrap !important;
    align-items:center !important;
}


.modo-pdf .row.mb-4 .col-md-5{
    width:41.666% !important;
}


.modo-pdf .row.mb-4 .col-md-4{
    width:33.333% !important;
}


.modo-pdf .row.mb-4 .col-md-3{
    width:25% !important;
}


.modo-pdf .row.mb-4 label{

    display:inline-block !important;
    margin:0 5px 0 0 !important;
    white-space:nowrap !important;

}


.modo-pdf .row.mb-4 input{

    display:inline-block !important;
    width:auto !important;
    border:0 !important;
    background:transparent !important;
    box-shadow:none !important;
    padding:0 !important;

}
    


/* ==========================================
   ALINEACION DE RENGLONES EN PDF
========================================== */

.modo-pdf input,
.modo-pdf textarea{

    display:inline-block !important;
    vertical-align:middle !important;

}


.modo-pdf label{

    vertical-align:middle !important;
    margin-bottom:0 !important;

}


/* Cantidad + hs */

.modo-pdf .cantidad-box{

    display:flex !important;
    align-items:center !important;
    justify-content:center !important;

}


.modo-pdf .cantidad-box .cantidad{

    line-height:1 !important;
    height:22px !important;
    padding:0 !important;

}


.modo-pdf .cantidad-box .input-group-text{

    line-height:1 !important;
    height:auto !important;
    display:flex !important;
    align-items:center !important;

}



/* Datos superiores */

.modo-pdf .row.mb-4{

    align-items:center !important;

}


.modo-pdf .row.mb-4 label,
.modo-pdf .row.mb-4 input{

    line-height:1.2 !important;

}




    
</style>
</head>
<body>

<div class="container my-4">

<div class="documento" id="contenidoPDF">

    <!-- ENCABEZADO -->
  <div class="row align-items-center border-bottom pb-3 mb-4">

    <!-- Logo -->
    <div class="col-md-2 text-center">
        <img src="LOGO.jpeg"
             class="img-fluid rounded"
             style="max-height:120px;"
             alt="Logo El Baqueano">
    </div>

    <!-- Datos Empresa -->
    <div class="col-md-7">
        <h2 class="fw-bold mb-1">EL BAQUEANO</h2>

        <div class="text-muted">
            <div><strong>Localidad:</strong> Mariano I. Loza</div>
            <div><strong>Teléfono:</strong> 3773431057</div>
            <div><strong>Email:</strong> transporteelbaqueano@gmail.com</div>
        </div>
    </div>

    <!-- Presupuesto -->
    <div class="col-md-3 text-end">
        <h4 class="text-primary fw-bold mb-0"></h4>
        <small class="text-muted"> </small>
    </div>

</div>
    

    <div class="titulo">
        PRESUPUESTO
    </div>

    <!-- DATOS -->
    <div class="row mb-4">
        <div class="col-md-5">
            <label class="fw-bold">Facturación:</label>
            <input class="form-control" id="facturacion" placeholder="Cliente">
        </div>

        <div class="col-md-4">
            <label class="fw-bold">Envíe a:</label>
            <input class="form-control" id="envio" placeholder="Destino">
        </div>

        <div class="col-md-3">
        

            <label class="fw-bold">Fecha:</label>
            <input type="date" class="form-control" id="fecha">
        </div>
    </div>

    <!-- DESCRIPCION -->
    <div class="mb-3">
        <label class="fw-bold">Descripción del trabajo</label>
        <textarea class="form-control" rows="2" id="descripcion"> </textarea>
    </div>

    <!-- TABLA -->
    <table class="table table-bordered align-middle" id="tablaItems">
        <thead>
            <tr>
                <th width="5%">#</th>
                <th>Producto / Servicio</th>
                <th width="12%">Cantidad</th>
                <th width="15%">Tarifa</th>
                <th width="15%">Importe</th>
                <th width="5%" class="no-print no-pdf">X</th>
            </tr>
        </thead>

        <tbody id="tbody">

        </tbody>
    </table>

    <button class="btn btn-success no-print no-pdf mb-4" onclick="agregarFila()">
        Agregar Item
    </button>

    <!-- OBSERVACIONES -->
    <div class="row">
        <div class="col-md-7">
            <label class="fw-bold">Observaciones</label>
            <textarea class="form-control" rows="4" id="observaciones">  </textarea>
        </div>

        <div class="col-md-5">
            <table class="table">
                <tr>
                    <td>Subtotal</td>
                    <td class="text-end" id="subtotal">$ 0</td>
                </tr>

               <tr>
    <td>IVA (%)</td>
    <td>
        <div class="d-flex justify-content-end">
            <input
                type="number"
                class="form-control text-end"
                id="iva"
                value="21"
                onchange="calcularTotales()"
                style="width:90px;">
        </div>
    </td>
</tr>

                <tr>
                    <td>IVA</td>
                    <td class="text-end" id="montoIva">$ 0</td>
                </tr>

                <tr class="table-primary">
                    <td class="fw-bold">TOTAL</td>
                    <td class="text-end fw-bold" id="total">$ 0</td>
                </tr>
            </table>
        </div>
    </div>

    <!-- FIRMA -->
    <div class="row mt-5">
        <div class="col-6"></div>

        <div class="col-6 text-center">
            <br><br>
            ___________________________
            <br>
            AGUERRE LUCAS
        </div>
    </div>

</div>

<!-- BOTONES -->
<div class="text-center my-4 no-print">
    <button class="btn btn-danger btn-lg"
            onclick="generarPDF()">
        Generar PDF
    </button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

function formatoMoneda(valor){
    return new Intl.NumberFormat('es-AR',{
        style:'currency',
        currency:'ARS'
    }).format(valor);
}

function agregarFila(
    producto='',
    detalle='',
    cantidad='',
    tarifa=''
){

    let tbody=document.getElementById('tbody');

    let fila=document.createElement('tr');

    fila.innerHTML=`
        <td class="numero"></td>

        <td>
            <input class="form-control producto"
                   value="${producto}"
                   placeholder="Producto">

            <input class="form-control mt-1 detalle"
                   value="${detalle}"
                   placeholder="Detalle">
        </td>

     <td>
       <div class="input-group cantidad-box">

<input type="number"
class="form-control cantidad text-end"
value="${cantidad}"
min="0"
oninput="calcularTotales()">

<span class="input-group-text">
hs
</span>

</div>
        </td>

        <td>
            <input type="number"
                   class="form-control tarifa"
                   value="${tarifa}"
                   oninput="calcularTotales()">
        </td>

        <td class="importe text-end">
            $0
        </td>

        <td class="no-print no-pdf">
            <button class="btn btn-sm btn-danger"
            onclick="eliminarFila(this)">
            X
            </button>
        </td>
    `;

    tbody.appendChild(fila);

    numerar();
    calcularTotales();
}

function eliminarFila(btn){
    btn.closest('tr').remove();
    numerar();
    calcularTotales();
}

function numerar(){

    document.querySelectorAll('.numero')
    .forEach((td,index)=>{
        td.innerText=index+1;
    });

}

function calcularTotales(){

    let subtotal=0;

    document.querySelectorAll('#tbody tr')
    .forEach(fila=>{

        let cantidad=
        parseFloat(
            fila.querySelector('.cantidad').value
        )||0;

        let tarifa=
        parseFloat(
            fila.querySelector('.tarifa').value
        )||0;

        let importe=
        cantidad*tarifa;

        subtotal+=importe;

        fila.querySelector('.importe')
        .innerText=
        formatoMoneda(importe);

    });

    let ivaPorcentaje=
    parseFloat(
        document.getElementById('iva').value
    )||0;

    let iva=subtotal*ivaPorcentaje/100;

    let total=subtotal+iva;

    document.getElementById('subtotal')
    .innerText=formatoMoneda(subtotal);

    document.getElementById('montoIva')
    .innerText=formatoMoneda(iva);

    document.getElementById('total')
    .innerText=formatoMoneda(total);

}

async function generarPDF(){

    const contenido = document.getElementById('contenidoPDF');

    contenido.classList.add('modo-pdf');

    document.querySelectorAll('.no-pdf').forEach(el => {
        el.style.display = 'none';
    });

    try{

        const { jsPDF } = window.jspdf;

        const contenido =
        document.getElementById('contenidoPDF');

        const canvas =
        await html2canvas(contenido,{
            scale:3,
            useCORS:true,
            logging:false
        });

        const imgData =
        canvas.toDataURL('image/jpeg',1.0);

        const pdf =
        new jsPDF('p','mm','a4');

        const pdfWidth = 210;
        const pdfHeight = 297;

        const imgWidth = pdfWidth;
        const imgHeight =
        (canvas.height * imgWidth) /
        canvas.width;

        let heightLeft = imgHeight;
        let position = 0;

        pdf.addImage(
            imgData,
            'JPEG',
            0,
            position,
            imgWidth,
            imgHeight
        );

        heightLeft -= pdfHeight;

        while(heightLeft > 0){

            position =
            heightLeft - imgHeight;

            pdf.addPage();

            pdf.addImage(
                imgData,
                'JPEG',
                0,
                position,
                imgWidth,
                imgHeight
            );

            heightLeft -= pdfHeight;
        }

       const cliente =
    document.getElementById('facturacion').value ||
    'Cliente';

let nombreArchivo = cliente
    .trim()
    .replace(/[^a-zA-Z0-9áéíóúÁÉÍÓÚñÑ ]/g, '')
    .replace(/\s+/g, '-');

pdf.save('Presupuesto-' + nombreArchivo + '.pdf');
contenido.classList.remove('modo-pdf');

document.querySelectorAll('.no-pdf').forEach(el => {
    el.style.display = '';
});

    }catch(error){

        console.error(error);

        alert(
            'Error al generar PDF'
        );
    }
}


// Datos iniciales similares a tu ejemplo
document.getElementById('fecha').value =
new Date().toISOString().split('T')[0];

agregarFila();

</script>

</body>
</html>
